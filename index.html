<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM.com North America HALO Demo Hub</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        body.home {
            background: url('img/halo-bg.png') center/cover no-repeat fixed;
        }
    </style>
</head>

<body class="home">
    <header>
        <div class="logo-container">
            <div class="logo" role="img" aria-label="CM.com logo"></div>
        </div>
        <h1>CM.com North America HALO Demo Hub</h1>
        <p class="subtitle">The hub for HALO demo implementations from the CM.com NA team</p>
    </header>

    <div class="tabs-container">
        <nav class="tabs" role="tablist" aria-label="Demo categories">
            <div class="tab active" role="tab" aria-selected="true"  tabindex="0"  id="tab-team"  >Team</div>
            <div class="tab"        role="tab" aria-selected="false" tabindex="-1" id="tab-tools" >Tools</div>
            <div class="tab"        role="tab" aria-selected="false" tabindex="-1" id="tab-videos">Videos</div>
        </nav>
    </div>

    <div class="demo-grid tab-content" id="demoGrid" role="tabpanel"></div>

    <!-- Video Player Overlay -->
    <div class="video-overlay" id="videoOverlay" aria-modal="true" aria-label="Video player">
        <div class="video-player-container">
            <button class="close-video-btn" id="closeVideoBtn" aria-label="Close video player">&times;</button>
            <video id="videoPlayer" autoplay></video>
        </div>
    </div>

    <footer>
        <p>CM.com North America HALO Demo Hub | <a href="https://www.cm.com/" target="_blank" rel="noopener">Visit CM.com</a></p>
    </footer>

    <script>
        /* ── Data ────────────────────────────────────────────── */
        const teamDemos = [
            { name: "Corey Reed",     path: "DemoPages/corey-reed/index.html" },
            { name: "David White",    path: "DemoPages/david-white/index.html" },
            { name: "Evan Manning",   path: "DemoPages/evan-manning/index.html" },
            { name: "Matt Lambson",   path: "DemoPages/matt-lambson/index.html" },
            { name: "Michael Ogorek", path: "DemoPages/michael-ogorek/index.html" }
        ];

        const toolDemos = [
            { name: "Statement of Work Builder", path: "DemoPages/sow-builder/index.html" },
            { name: "Who is CM.com?", path: "DemoPages/who-is-cm/index.html", buttonText: "View Page" }
        ];

        const videosDemos = [
            { name: "Vertical Videos",   path: "DemoPages/videos/verticals/index.html" },
            { name: "All Videos (Looped)", path: "ALL_VIDEOS_LOOPED", isVideoPlayer: true }
        ];

        const verticalVideos = [
            "DemoPages/videos/halo-by-cm.mp4",
            "DemoPages/videos/edtech.mp4",
            "DemoPages/videos/hospitality.mp4",
            "DemoPages/videos/retail.mp4",
            "DemoPages/videos/theme-parks.mp4",
            "DemoPages/videos/what-is-engagement.mp4"
        ];

        /* ── Video player ───────────────────────────────────── */
        let currentVideoIndex = 0;

        function openVideoPlayer() {
            currentVideoIndex = 0;
            document.getElementById('videoOverlay').classList.add('active');
            playCurrentVideo();
        }

        function closeVideoPlayer() {
            const overlay = document.getElementById('videoOverlay');
            const videoPlayer = document.getElementById('videoPlayer');
            overlay.classList.remove('active');
            videoPlayer.pause();
            videoPlayer.src = '';
        }

        function playCurrentVideo() {
            const videoPlayer = document.getElementById('videoPlayer');
            if (!verticalVideos.length) return;
            videoPlayer.src = verticalVideos[currentVideoIndex];
            videoPlayer.play();
        }

        function playNextVideo() {
            currentVideoIndex = (currentVideoIndex + 1) % verticalVideos.length;
            playCurrentVideo();
        }

        /* ── Ripple effect ──────────────────────────────────── */
        function addRippleEffect(e) {
            const tab  = e.currentTarget;
            const ripple = document.createElement('span');
            const rect = tab.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width  = ripple.style.height = size + 'px';
            ripple.style.left   = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top    = (e.clientY - rect.top  - size / 2) + 'px';
            ripple.classList.add('ripple');
            tab.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        /* ── Render demo cards ──────────────────────────────── */
        function renderDemos(demoList, buttonText = 'View Demo') {
            const grid = document.getElementById('demoGrid');

            // Fade out → update → fade in
            grid.classList.add('switching');

            setTimeout(() => {
                grid.innerHTML = '';

                if (!demoList.length) {
                    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:30px;color:rgba(255,255,255,0.6);">No demos found.</p>';
                    grid.classList.remove('switching');
                    return;
                }

                demoList.forEach((demo, i) => {
                    const card = document.createElement('a');

                    if (demo.isVideoPlayer) {
                        card.href = '#';
                        card.addEventListener('click', e => { e.preventDefault(); openVideoPlayer(); });
                    } else {
                        card.href = demo.path;
                    }

                    card.className = 'demo-card';
                    // JS-driven stagger so nth-child limits never apply
                    card.style.animationDelay = (0.05 + i * 0.06) + 's';

                    const displayButtonText = demo.buttonText || buttonText;
                    card.innerHTML = `
                        <h3 class="card-title">${demo.name}</h3>
                        <div><span class="view-button">${displayButtonText}</span></div>
                    `;
                    grid.appendChild(card);
                });

                grid.classList.remove('switching');
            }, 180);
        }

        /* ── Tab system ─────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', () => {
            const allTabs = Array.from(document.querySelectorAll('nav.tabs .tab'));
            const videoPlayer  = document.getElementById('videoPlayer');
            const closeVideoBtn = document.getElementById('closeVideoBtn');

            const tabData = {
                'tab-team':   { list: teamDemos,   label: 'View Demo'   },
                'tab-tools':  { list: toolDemos,   label: 'View Tool'   },
                'tab-videos': { list: videosDemos, label: 'View Videos' }
            };

            videoPlayer.addEventListener('ended', playNextVideo);
            closeVideoBtn.addEventListener('click', closeVideoPlayer);
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') closeVideoPlayer();
            });

            function setActiveTab(tabEl) {
                allTabs.forEach(t => {
                    const isActive = t === tabEl;
                    t.classList.toggle('active', isActive);
                    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
                    t.setAttribute('tabindex', isActive ? '0' : '-1');
                });
                const { list, label } = tabData[tabEl.id];
                renderDemos(list, label);
            }

            allTabs.forEach(tab => {
                tab.addEventListener('click', e => {
                    addRippleEffect(e);
                    setActiveTab(tab);
                });

                tab.addEventListener('keydown', e => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        setActiveTab(tab);
                        return;
                    }
                    // Arrow key navigation (ARIA tabs pattern)
                    const idx = allTabs.indexOf(tab);
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        const next = allTabs[(idx + 1) % allTabs.length];
                        next.focus();
                        setActiveTab(next);
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        const prev = allTabs[(idx - 1 + allTabs.length) % allTabs.length];
                        prev.focus();
                        setActiveTab(prev);
                    }
                });
            });

            // Default tab
            setActiveTab(allTabs[0]);
        });
    </script>
</body>

</html>
